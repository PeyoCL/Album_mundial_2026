<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Mundial 2026</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.svg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=14">
</head>
<body>
    <div id="app">
        <canvas id="confetti-canvas"></canvas>

        <header class="app-header">
            <div class="header-top">
                <div class="header-titles">
                    <h1 id="album-title" contenteditable="true" spellcheck="false" title="Toca para editar tu nombre">Mi Álbum</h1>
                    <span class="subtitle">Mundial 2026 · 48 selecciones · 994 láminas <span class="app-version">v14</span></span>
                </div>
                <div class="header-actions">
                    <button id="btn-theme" title="Cambiar Tema">🌙</button>
                    <button id="btn-settings" title="Configuración">⚙️</button>
                </div>
            </div>
            
            <div class="header-controls">
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Buscar equipo, sección, lámina...">
                </div>
                <div class="filters">
                    <select id="filter-team"><option value="all">Todos los Equipos</option></select>
                    <select id="filter-group"><option value="all">Todos los Grupos</option></select>
                    <button id="btn-clear-filters">Borrar</button>
                </div>
                <div class="sort-bar">
                    <span class="results-counter" id="results-counter">0 resultados</span>
                    <select id="sort-select">
                        <option value="all">Todos (Orden base)</option>
                        <option value="most">Más completos</option>
                        <option value="least">Menos completos</option>
                        <option value="az">Equipos A-Z</option>
                    </select>
                </div>
            </div>
        </header>
